name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://pypi.org/p/rohan-portal-gun
    permissions:
      id-token: write
    defaults:
      run:
        working-directory: rohan-portal-gun
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pipx install poetry

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(poetry version -s)
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "Tag $TAG does not match pyproject.toml version $PKG_VERSION"
            exit 1
          fi

      - name: Build package
        run: poetry build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: rohan-portal-gun/dist
